
name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libbz2-dev libreadline-dev libsqlite3-dev libssl-dev libffi-dev

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython kivy g4f nest_asyncio aiohttp buildozer

    - name: Auto Generate and Fix Buildozer Spec
      run: |
        rm -f buildozer.spec
        buildozer init
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,g4f,nest_asyncio,aiohttp/g' buildozer.spec
        sed -i 's/#android.permissions = INTERNET/android.permissions = INTERNET/g' buildozer.spec
        sed -i 's/android.api = 33/android.api = 31/g' buildozer.spec

    - name: Build APK with Buildozer
      run: |
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: bin/*.apk
